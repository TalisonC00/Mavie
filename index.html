<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Aninho da Mavie</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            /* Fundo com gradiente suave aquarela */
            background: linear-gradient(135deg, #fffafa 0%, #fef0ff 50%, #fff9e6 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #5d5d5d;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 25px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.2);
            width: 85%;
            max-width: 380px;
            text-align: center;
            border: 4px solid #fff;
        }

        h1 { color: #ff85a2; font-size: 2.2rem; margin-bottom: 5px; }
        .subtitulo { color: #b39cd0; font-weight: bold; margin-bottom: 25px; font-size: 1.1rem; }

        /* Estilo dos blocos de informação */
        .secao {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 25px;
            background: #ffffff;
            border: 2px solid #fdf0f0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            animation: subir 0.6s ease-out;
        }

        @keyframes subir {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Botão do Google Maps */
        .btn-mapa {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #9370db;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .lista-presentes {
            text-align: left;
            display: inline-block;
            list-style: none;
            padding: 0;
        }

        .lista-presentes li { margin: 10px 0; font-size: 1rem; }

        .loading-text { color: #ffb6c1; font-style: italic; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🧸 Mavie 🎂</h1>
        <div class="subtitulo">Meu 1º Aninho • 05/07/2026</div>
        
        <p id="status" class="loading-text">Carregando surpresa...</p>

        <div id="endereco" class="secao">
            <h3 style="color: #9370db;">📍 Local da Festa</h3>
            <p><strong>Salão de Festas Alegria Doce</strong><br>
            Rua das Cores, nº 123 - Bairro Feliz</p>
            <a href="https://maps.google.com/?q=Rua+das+Cores+123+Sao+Paulo" target="_blank" class="btn-mapa">Abrir no GPS 🚗</a>
        </div>

        <div id="presentes" class="secao">
            <h3 style="color: #ffb6c1;">🎁 Sugestões da Mavie</h3>
            <ul class="lista-presentes">
                <li>🧸 Brinquedos infantis</li>
                <li>👗 Roupa tamanho 2</li>
                <li>🩰 Sapato/sandália 22/23</li>
            </ul>
        </div>
    </div>

    <script>
        window.onload = function() {
            const acao = window.location.hash;
            const status = document.getElementById('status');

            if (acao === "#confirmar") {
                status.innerText = "Redirecionando para o WhatsApp...";
                const fone = "5511958955399";
                const msg = encodeURIComponent("Passando para confirmar minha presença na festa da Mavie! 🩷💜💛");
                window.location.href = "https://wa.me/" + fone + "?text=" + msg;
            } 
            else if (acao === "#endereco") {
                status.style.display = "none";
                document.getElementById('endereco').style.display = 'block';
            } 
            else if (acao === "#presentes") {
                status.style.display = "none";
                document.getElementById('presentes').style.display = 'block';
            }
            else {
                status.innerText = "Clique em um dos botões do convite para ver os detalhes! ✨";
            }
        };
    </script>
</body>
</html>
