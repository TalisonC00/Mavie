<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1º Aninho da Mavie</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #fffafa 0%, #fef0ff 50%, #fff9e6 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column; /* Organiza em coluna */
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* IMAGEM DOS PERSONAGENS QUE VOCÊ ENVIOU */
        .banner-bolofofos {
            width: 100%;
            max-width: 300px; /* Não deixa ficar gigante */
            margin-bottom: -20px; /* Faz a imagem "entrar" um pouco no card */
            z-index: 1;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 25px 40px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.2);
            width: 90%;
            max-width: 380px;
            text-align: center;
            border: 4px solid #ffffff;
        }

        h1 { color: #ff85a2; font-size: 2.2rem; margin: 10px 0 5px; }
        .subtitulo { color: #b39cd0; font-weight: bold; margin-bottom: 25px; }

        .secao {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 25px;
            background: #ffffff;
            border: 2px solid #fdf0f0;
            animation: subir 0.6s ease-out forwards;
        }

        @keyframes subir {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-mapa {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: #9370db;
            color: white !important;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }

        ul { text-align: left; display: inline-block; padding: 0; list-style: none; }
        li { margin: 10px 0; }
    </style>
</head>
<body>

    <img src="foto.jpg" class="banner-bolofofos" alt="Bolofofos Festa">

    <div class="card">
        <h1>Mavie 🎂</h1>
        <div class="subtitulo">Meu 1º Aninho • 05/07/2026</div>
        
        <p id="status" style="color: #ffb6c1;">Aguardando seu clique... ✨</p>

        <div id="endereco" class="secao">
            <h3 style="color: #9370db;">📍 Local da Festa</h3>
            <p>Salão de Festas Alegria Doce<br>Rua das Cores, nº 123</p>
            <a href="https://maps.google.com" target="_blank" class="btn-mapa">Abrir GPS</a>
        </div>

        <div id="presentes" class="secao">
            <h3 style="color: #ffb6c1;">🎁 Sugestões</h3>
            <ul>
                <li>🧸 Brinquedos infantis</li>
                <li>👗 Roupa tamanho 2</li>
                <li>🩰 Sapato 22/23</li>
            </ul>
        </div>
    </div>

    <script>
        window.onload = function() {
            const hash = window.location.hash;
            if (hash === "#confirmar") {
                window.location.href = "https://wa.me/5511958955399?text=" + encodeURIComponent("Passando para confirmar minha presença na festa da Mavie! 🩷💜💛");
            } else if (hash === "#endereco") {
                document.getElementById('status').style.display = "none";
                document.getElementById('endereco').style.display = 'block';
            } else if (hash === "#presentes") {
                document.getElementById('status').style.display = "none";
                document.getElementById('presentes').style.display = 'block';
            }
        };
    </script>
</body>
</html>
