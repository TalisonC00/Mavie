<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mavie Bolofofos</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #fffafa 0%, #fef0ff 50%, #fff9e6 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #4a4a4a;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 25px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.15);
            width: 90%;
            max-width: 380px;
            text-align: center;
            border: 2px solid #ffffff;
            position: relative;
            overflow: hidden; /* Garante que a foto ao fundo não saia do cartão */
        }

        /* Foto dos Bolofofos centralizada ao fundo */
        .foto-fundo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; /* Ajuste o tamanho para não cobrir tudo */
            opacity: 0.15; /* Deixa a foto suave ao fundo para não atrapalhar o texto */
            z-index: 0;
            pointer-events: none;
        }

        /* Conteúdo do cartão que ficará por cima da foto */
        .conteudo {
            position: relative;
            z-index: 1;
        }

        h1 { 
            color: #ff6dae; 
            font-size: 2.8rem; 
            margin: 0; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .subtitulo { 
            color: #9a84b4; 
            font-weight: bold; 
            font-size: 1.2rem;
            margin-bottom: 30px;
            display: block;
        }

        #status { 
            font-size: 0.95rem; 
            color: #ffb6c1; 
            margin-bottom: 10px;
        }

        .secao {
            display: none;
            margin-top: 20px;
            padding: 25px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #fdf0f0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .btn-mapa {
            display: inline-block;
            margin-top: 15px;
            padding: 14px 28px;
            background: #9370db;
            color: white !important;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        ul { text-align: left; display: inline-block; padding: 0; list-style: none; }
        li { margin: 12px 0; font-size: 1.05rem; }
    </style>
</head>
<body>

    <div class="card">
        <img src="festa.jpg" class="foto-fundo" alt="">

        <div class="conteudo">
            <h1>Mavie 🎂</h1>
            <span class="subtitulo">Meu 1º Aninho • 05/07/2026</span>
            
            <p id="status">Detalhes da festa liberados! ✨</p>

            <div id="endereco" class="secao">
                <h3 style="color: #9370db; margin-top: 0;">📍 Onde será a festa?</h3>
                <p><strong>Salão Alegria Doce</strong><br>
                Rua das Cores, nº 123 - Bairro Feliz</p>
                <a href="https://www.google.com/maps" target="_blank" class="btn-mapa">ABRIR NO GPS 🚗</a>
            </div>

            <div id="presentes" class="secao">
                <h3 style="color: #ff85a2; margin-top: 0;">🎁 Sugestões de Presente</h3>
                <ul>
                    <li>🧸 Brinquedos infantis</li>
                    <li>👗 Roupas (Tamanho 2)</li>
                    <li>🩰 Calçados (Número 22/23)</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const hash = window.location.hash;
            const status = document.getElementById('status');
            
            if (hash === "#confirmar") {
                window.location.href = "https://wa.me/5511958955399?text=" + encodeURIComponent("Passando para confirmar minha presença na festa da Mavie! 🩷💜💛");
            } else if (hash === "#endereco") {
                status.style.display = "none";
                document.getElementById('endereco').style.display = 'block';
            } else if (hash === "#presentes") {
                status.style.display = "none";
                document.getElementById('presentes').style.display = 'block';
            }
        };
    </script>
</body>
</html>
