<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mavie Bolofofos</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #fffafa 0%, #fef0ff 50%, #fff9e6 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #4a4a4a;
        }

        /* Banner com bordas suaves e flutuação */
        .banner-bolofofos {
            width: 100%;
            max-width: 280px;
            margin-bottom: -30px;
            z-index: 2;
            border-radius: 20px;
            /* Se a imagem for JPG branca, este filtro ajuda a misturar: */
            mix-blend-mode: multiply; 
            animation: flutuar 3s ease-in-out infinite;
        }

        @keyframes flutuar {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        /* Cartão com efeito 'Glassmorphism' */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 50px 25px 40px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.15);
            width: 90%;
            max-width: 380px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        h1 { color: #ff6dae; font-size: 2.5rem; margin: 10px 0 5px; text-shadow: 2px 2px 0px #fff; }
        .subtitulo { color: #9a84b4; font-weight: bold; margin-bottom: 25px; letter-spacing: 1px; }

        .secao {
            display: none;
            margin-top: 25px;
            padding: 25px;
            border-radius: 30px;
            background: #ffffff;
            border: 2px dashed #ffb6c1;
            box-shadow: inset 0 0 15px rgba(255, 182, 193, 0.1);
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes bounceIn {
            from { opacity: 0; scale: 0.5; }
            to { opacity: 1; scale: 1; }
        }

        .btn-mapa {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: linear-gradient(to right, #9370db, #a285e0);
            color: white !important;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(147, 112, 219, 0.4);
            transition: 0.3s;
        }

        .btn-mapa:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(147, 112, 219, 0.6); }

        ul { text-align: left; display: inline-block; padding: 0; list-style: none; }
        li { margin: 15px 0; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        
        #status { font-size: 0.9rem; color: #ffb6c1; font-weight: 500; }
    </style>
</head>
<body>

    <img src="festa.jpg" class="banner-bolofofos" alt="Mavie Bolofofos">

    <div class="card">
        <h1>Mavie 🌸</h1>
        <div class="subtitulo">1º ANINHO • 05/07/2026</div>
        
        <p id="status">✨ Verifique os detalhes abaixo ✨</p>

        <div id="endereco" class="secao">
            <h3 style="color: #9370db; margin-top: 0;">📍 Onde vamos festejar?</h3>
            <p><strong>Salão Alegria Doce</strong><br>
            Rua das Cores, nº 123<br>
            Bairro Feliz - SP</p>
            <a href="COLE_AQUI_O_LINK_DO_MAPS" target="_blank" class="btn-mapa">ABRIR NO GPS 🚗</a>
        </div>

        <div id="presentes" class="secao">
            <h3 style="color: #ff85a2; margin-top: 0;">🎁 Ideias para Presente</h3>
            <ul>
                <li>🧸 Brinquedos infantis</li>
                <li>👗 Roupas (Tamanho 2)</li>
                <li>🩰 Calçados (Número 22/23)</li>
            </ul>
        </div>
    </div>

    <script>
        window.onload = function() {
            const hash = window.location.hash;
            const status = document.getElementById('status');
            
            if (hash === "#confirmar") {
                status.innerText = "Redirecionando para confirmação... 💌";
                window.location.href = "https://wa.me/5511958955399?text=" + encodeURIComponent("Passando para confirmar minha presença na festa da Mavie! 🩷💜💛");
            } else if (hash === "#endereco") {
                status.style.display = "none";
                document.getElementById('endereco').style.display = 'block';
            } else if (hash === "#presentes") {
                status.style.display = "none";
                document.getElementById('presentes').style.display = 'block';
            }
        };
    </script>
</body>
</html>
