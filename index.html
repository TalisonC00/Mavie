<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mavie Bolofofos</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #fffafa 0%, #fef0ff 50%, #fff9e6 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #4a4a4a;
        }

        .card {
            background: #ffffff;
            padding: 0 0 40px 0; /* Remove preenchimento no topo para a foto encostar */
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.2);
            width: 90%;
            max-width: 380px;
            text-align: center;
            border: 4px solid #ffffff;
            overflow: hidden; /* Corta a foto nas bordas arredondadas */
        }

        /* Foto no Topo do Cartão */
        .foto-topo {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 20px;
        }

        .conteudo {
            padding: 0 25px;
        }

        h1 { 
            color: #ff6dae; 
            font-size: 2.8rem; 
            margin: 0; 
        }

        .subtitulo { 
            color: #9a84b4; 
            font-weight: bold; 
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: block;
        }

        #status { 
            font-size: 0.9rem; 
            color: #ffb6c1; 
            margin-bottom: 10px;
            font-weight: 500;
        }

        .secao {
            display: none;
            margin-top: 15px;
            padding: 20px;
            border-radius: 25px;
            background: #fff9fb;
            border: 2px solid #fdf0f0;
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .btn-mapa {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: #9370db;
            color: white !important;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        ul { text-align: left; display: inline-block; padding: 0; list-style: none; margin: 0; }
        li { margin: 10px 0; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="card">
        <img src="foto.jpg" class="foto-topo" alt="Bolofofos">

        <div class="conteudo">
            <h1> Mavie </h1>
            <span class="subtitulo"> • Meu 1º Aninho • </span>
            
            <p id="status">✨ Detalhes liberados abaixo ✨</p>

            <div id="endereco" class="secao">
                <h3 style="color: #9370db; margin: 0 0 10px 0;">📍Endereço</h3>
                <p style="margin: 0;"><strong>Salão Alegria Doce</strong><br>
                R. Alagoas, 776 - Recanto Silvestre - Fazendinha</p>
                <a href="https://www.google.com/maps/place/R.+Alagoas,+776+-+Recanto+Silvestre+(Fazendinha),+Santana+de+Parna%C3%ADba+-+SP,+06530-245/@-23.4118903,-46.8859771,17z/data=!3m1!4b1!4m6!3m5!1s0x94cf1c8c58dd2a2f:0xbece7d5f8d22f4!8m2!3d-23.4118903!4d-46.8859771!16s%2Fg%2F11gchxfx8z?entry=ttu&g_ep=EgoyMDI2MDQyMi4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="btn-mapa">Abrir no GPS 🚗</a>
            </div>

            <div id="presentes" class="secao">
                <h3 style="color: #ff85a2; margin: 0 0 10px 0;">🎁 Sugestões</h3>
                <ul>
                    <li>🧸 Brinquedos infantis</li>
                    <li>👗 Roupas (Tamanho 2)</li>
                    <li>🩰 Calçados (Número 22/23)</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const hash = window.location.hash;
            const status = document.getElementById('status');
            
            if (hash === "#confirmar") {
               const texto = encodeURIComponent("Passando para confirmar minha presença na festa de 1 aninho da Mavie! \uD83E\uDE77\uD83D\uDC9A\uD83D\uDDA4");
               window.location.href = "https://wa.me/5511958955399?text=" + texto;
            } else if (hash === "#endereco") {
                status.style.display = "none";
                document.getElementById('endereco').style.display = 'block';
            } else if (hash === "#presentes") {
                status.style.display = "none";
                document.getElementById('presentes').style.display = 'block';
            }
        };
    </script>
</body>
</html>
